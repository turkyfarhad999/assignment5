<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Github</title>
</head>
<body>
  <section class="md:max-w-1/3 mx-auto py-16 shadow-2xl">
    <div class="text-center space-y-2">
        <img src="./assets/github-logo.png" alt="" class="mx-auto">
        <h1 class="font-semibold text-[24px]">GitHub Issues Tracker</h1>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
    </div>
    <fieldset class="fieldset  border-base-100 rounded-box w-xs border p-4 mx-auto">
  

  <label class="label font-bold text-black" >Username</label>
  <input id="username" type="text" class="input" placeholder="Username" />

  <label class="label  font-bold text-black">Password</label>
  <input id="pass" type="password" class="input" placeholder="Password" />

  <button id="loginbtn" class="btn btn-primary mt-4">Login</button>
</fieldset>
<div class="text-center font-semibold text-[18px]">Or</div>
<div class="text-center text-[#64748B]">Demo Credentials:</div>
<div class="text-center p-5">   
<p><span class="font-semibold">Username:</span> admin</p>
<p><span class="font-semibold">Password:</span> admin123</p>
</div>
  </section>
  <script src="./script/login.js"></script>
</body>
</html>
